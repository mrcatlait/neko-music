<header class="genres-management-page__header">
  <button
    color="standard"
    nIconButton
    type="button"
    variant="filled"
    (click)="navigateToGenreList()"
  >
    <i>arrow_back</i>
  </button>

  <h2>Create Genre</h2>
</header>

<n-genre-form
  submitLabel="Create genre"
  [saving]="saving()"
  (formCancel)="navigateToGenreList()"
  (formSubmit)="createGenre($event)"
/>
