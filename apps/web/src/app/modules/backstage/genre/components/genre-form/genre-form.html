<form
  autocomplete="off"
  class="genre-form"
  (submit)="$event.preventDefault(); submit()"
>
  <n-textfield>
    <label for="name">Name</label>

    <input
      id="name"
      type="text"
      [formField]="genreForm"
    />

    @let nameTouched = name.touched();

    @if (name.invalid() && nameTouched) {
      <i
        aria-hidden="true"
        class="color-error"
        slot="right"
      >
        error
      </i>
    }

    <span slot="error">
      @if (name.invalid() && nameTouched) {
        @if (hasRequiredError()) {
          <span>Name is required</span>
        }
      }
    </span>
  </n-textfield>

  <button
    class="genre-form__submit"
    nButton
    type="submit"
    [disabled]="saving()"
  >
    @if (saving()) {
      <n-loading-indicator [size]="12" />
    } @else {
      {{ submitLabel() }}
    }
  </button>
</form>
