<header class="genre-list__header">
  <h2>Genres</h2>

  <button
    color="primary"
    nButton
    routerLink="/backstage/genres/new"
    type="button"
    variant="filled"
  >
    <i>add</i>
    Create new
  </button>
</header>

@if (!genresResource.error()) {
  <ag-grid-angular
    class="genre-list__table"
    [columnDefs]="columnDefs"
    [gridOptions]="gridOptions"
    [modules]="modules"
    [rowData]="genresResource.value()?.backstageGenres ?? []"
  />
} @else {
  <div class="genre-table__error">
    <p class="body-medium">{{ genresResource.error()?.message }}</p>
  </div>
}
