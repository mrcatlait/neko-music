@if (!artistsResource.error()) {
  <ag-grid-angular
    class="artist-table__table"
    [columnDefs]="columnDefs"
    [gridOptions]="gridOptions"
    [modules]="modules"
    [rowData]="artistsResource.value()?.backstageArtists ?? []"
  />
} @else {
  <div class="artist-table__error">
    <p class="body-medium">{{ artistsResource.error()?.message }}</p>
  </div>
}
