<section class="import-list">
  <header class="import-list__header">
    <div class="import-list__heading">
      <h1>Imports</h1>
      <p class="body-medium">Track import progress, resolve review items, and publish when ready.</p>
    </div>

    <button
      color="primary"
      nButton
      type="button"
      variant="filled"
      (click)="createNew()"
    >
      <i>add</i>
      Create import
    </button>
  </header>

  @if (!importsResource.error()) {
    <ag-grid-angular
      class="import-list__table"
      [columnDefs]="columnDefs"
      [gridOptions]="gridOptions"
      [modules]="modules"
      [rowData]="imports()"
    />
  } @else {
    <p class="body-medium import-list__empty">{{ importsResource.error()?.message }}</p>
  }
</section>
