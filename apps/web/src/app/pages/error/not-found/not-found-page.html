<section
  aria-labelledby="not-found-title"
  class="not-found-page"
>
  <div
    aria-hidden="true"
    class="not-found-page__illustration"
  >
    <div class="not-found-page__backdrop"></div>

    <div class="not-found-page__scene">
      <div class="not-found-page__missing">
        <p class="not-found-page__missing-code headline-large">404</p>
      </div>
    </div>
  </div>

  <div class="not-found-page__content">
    <h1
      class="not-found-page__title headline-medium"
      id="not-found-title"
    >
      We couldn't find that page
    </h1>

    <p class="not-found-page__description body-large">Maybe you can find what you need from our homepage</p>
  </div>

  <div class="not-found-page__actions">
    <a
      nButton
      routerLink="/"
    >
      Back to Homepage
    </a>
  </div>
</section>
