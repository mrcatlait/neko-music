$schema: 'https://moonrepo.dev/schemas/project.json'

stack: 'frontend'
layer: 'application'
language: 'typescript'

dependsOn:
  - id: 'permissions'
    scope: 'production'
  - id: 'selectors'
    scope: 'production'
  - id: 'contracts'
    scope: 'development'
  - id: 'eslint-config'
    scope: 'development'
  # - id: 'stylelint-config'
  #   scope: 'development'

fileGroups:
  app:
    - 'angular.*'

tasks:
  start:
    command: 'ng serve'
    preset: 'server'

  build:
    command: 'ng build'
    inputs:
      - '@group(app)'
      - '@group(sources)'
    outputs:
      - 'dist'

  bundle:
    command: 'esbuild-visualizer'
    args:
      - '--open'
      - '--metadata'
      - 'dist/stats.json'
      - '--template'
      - 'treemap'
      - '--filename'
      - 'dist/stats.html'
    options:
      runInCI: false
    deps:
      - 'build'

  test-unit:
    command: 'ng test'
    inputs:
      - '@group(app)'
      - '@group(sources)'
      - 'tsconfig.spec.json'

  test-integration:
    command: 'npm run test-integration'
    options:
      runInCI: false
    inputs:
      - '@group(app)'
      - '@group(sources)'
      - '@group(integration-tests)'
      - 'cypress.config.ts'
    outputs:
      - 'reports/integration'

  test-integration-ui:
    command: 'cypress open'
    options:
      runInCI: false

  test:
    options:
      runInCI: false
    deps:
      - 'test-unit'
      - 'test-integration'