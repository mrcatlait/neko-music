$schema: 'https://moonrepo.dev/schemas/project.json'

stack: 'backend'
layer: 'application'
language: 'typescript'

dependsOn:
  - id: 'permissions'
    scope: 'production'
  - id: 'contracts'
    scope: 'development'
  - id: 'eslint-config'
    scope: 'development'
  - id: 'test-deps'
    scope: 'development'

fileGroups:
  app:
    - 'nest-cli.*'

tasks:
  start:
    command: 'nest start -w'
    preset: 'server'

  build:
    command: 'nest build'
    inputs:
      - '@group(configs)'
      - '@group(app)'
      - '@group(sources)'
    outputs:
      - 'dist'

  typecheck:
    command: 'tsc'
    args:
      - '--noEmit'
      - '--pretty'
    inputs:
      - '@group(sources)'
      - '@globs(configs)'

  test-unit:
    command: 'vitest'
    args:
      - '--config'
      - 'vite-unit.config.ts'
    inputs:
      - '@globs(sources)'
      - 'vitest.config.*'
    outputs:
      - 'reports/unit'

  test-integration:
    command: 'vitest'
    args:
      - '--config'
      - 'vite-integration.config.ts'
    inputs:
      - '@globs(sources)'
      - '@globs(integration-tests)'
      - 'vite.config.*'
    outputs:
      - 'reports/integration'

  test-contract:
    command: 'vitest'
    args:
      - '--config'
      - 'vite-contract.config.ts'
    inputs:
      - '@globs(sources)'
      - '@globs(contract-tests)'
      - 'vite.config.contract.*'
    outputs:
      - 'reports/contract'

  test-performance:
    command: 'k6 run performance-tests/test.js'
    options:
      runInCI: false
    inputs:
      - '@globs(performance-tests)'

  test:
    options:
      runInCI: false
    deps:
      - 'test-unit'
      - 'test-integration'

  sonar:
    command: 'sonar'
    options:
      envFile: true
    inputs:
      - '@group(sources)'
      - '@group(unit-tests)'
      - 'sonar-project.properties'
    deps:
      - 'test-unit'